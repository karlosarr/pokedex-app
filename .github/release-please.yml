on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: dart
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-android:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version-file: pubspec.yaml, cache: true }
      - run: flutter pub get
      - run: flutter test --coverage
      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
      - name: Build APK + AAB
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=${{ needs.release-please.outputs.version }} \
            --build-number=${{ github.run_number }}
          flutter build appbundle --release \
            --build-name=${{ needs.release-please.outputs.version }} \
            --build-number=${{ github.run_number }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.ANDROID_KEY_PASSWORD }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            build/app/outputs/apk/release/*.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version-file: pubspec.yaml, cache: true }
      - run: flutter pub get
      - run: flutter test
      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.release-please.outputs.version }} \
            --build-number=${{ github.run_number }}
          cd build/ios/iphoneos && mkdir Payload && cp -r Runner.app Payload/
          zip -r ../../../build/ios/app-${{ needs.release-please.outputs.version }}.ipa Payload
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: build/ios/app-${{ needs.release-please.outputs.version }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
